<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <style>
        body{
            margin:0;
            font-family:Arial,sans-serif;
            background:linear-gradient(135deg,#667eea,#764ba2);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }
        .card{
            background:white;
            width:90%;
            max-width:520px;
            padding:40px;
            border-radius:25px;
            box-shadow:0 20px 50px rgba(0,0,0,.25);
        }
        h1{text-align:center;color:#333;}
        input{
            width:100%;
            padding:12px;
            border-radius:10px;
            border:1px solid #ccc;
            margin-top:6px;
        }
        button{
            width:100%;
            padding:15px;
            background:#667eea;
            color:white;
            border:none;
            border-radius:12px;
            font-weight:bold;
            margin-top:15px;
            cursor:pointer;
        }
        a{color:#667eea;font-weight:bold;}
    </style>
</head>
<body>

<div class="card">
    <h1>Create Account</h1>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Register</button>
    </form>

    <p style="text-align:center;">
        Already have an account?
        <a href="/login/">Login</a>
    </p>
</div>

</body>
</html>
