<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Quiz Result</title>

    <style>
        body{
            margin:0;
            font-family:Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .card{
            background:white;
            width:90%;
            max-width:650px;
            padding:40px;
            border-radius:25px;
            box-shadow:0 20px 50px rgba(0,0,0,0.25);
            text-align:center;
        }

        h1{
            color:#333;
            margin-bottom:25px;
        }

        .score{
            font-size:52px;
            font-weight:bold;
            color:#667eea;
            margin:20px 0;
        }

        .stats{
            display:grid;
            grid-template-columns: repeat(3, 1fr);
            gap:15px;
            margin:30px 0;
        }

        .stat-box{
            background:#f4f4f4;
            padding:18px;
            border-radius:16px;
        }

        .stat-box h3{
            margin:0;
            color:#333;
        }

        .stat-box p{
            margin:8px 0 0;
            color:#666;
        }

        .message{
            background:#f4f4f4;
            padding:20px;
            border-radius:16px;
            margin-top:25px;
            font-size:20px;
            font-weight:bold;
        }

        .package{
            display:block;
            margin-top:25px;
            padding:20px;
            border-radius:16px;
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            color:white;
            text-decoration:none;
            font-size:20px;
            font-weight:bold;
            transition:0.3s;
        }

        .package:hover{
            transform:scale(1.04);
        }

        .btn{
            display:inline-block;
            margin-top:25px;
            padding:14px 26px;
            background:#667eea;
            color:white;
            border-radius:12px;
            text-decoration:none;
            font-weight:bold;
        }
    </style>
</head>

<body>

<div class="card">
    <h1>🎯 Quiz Result</h1>

    <div class="score">{{ score }}%</div>

    <div class="stats">
        <div class="stat-box">
            <h3>{{ total }}</h3>
            <p>Total</p>
        </div>

        <div class="stat-box">
            <h3>{{ correct }}</h3>
            <p>Correct</p>
        </div>

        <div class="stat-box">
            <h3>{{ wrong }}</h3>
            <p>Wrong</p>
        </div>
    </div>

    <div class="message">
        {{ message }}
    </div>

    {% if show_package %}
        <a class="package" href="/package/{{ topic_id }}/">
            📚 Open Recommendation Package
        </a>
    {% endif %}

    <a class="btn" href="/topics/">Back to Topics</a>
</div>

</body>
</html>
