<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#667eea,#764ba2);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.card{
    background:white;
    width:90%;
    max-width:450px;
    padding:40px;
    border-radius:25px;
    box-shadow:0 20px 50px rgba(0,0,0,.25);
}

h1{
    text-align:center;
    margin-bottom:30px;
    color:#333;
}

input{
    width:100%;
    padding:14px;
    border-radius:12px;
    border:1px solid #ccc;
    margin-top:8px;
    margin-bottom:18px;
    font-size:16px;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:linear-gradient(90deg,#667eea,#764ba2);
    color:white;
    font-size:17px;
    font-weight:bold;
    cursor:pointer;
}

p{
    text-align:center;
    margin-top:20px;
}

a{
    color:#667eea;
    font-weight:bold;
    text-decoration:none;
}
</style>
</head>

<body>

<div class="card">

<h1>Welcome Back 👋</h1>

<form method="POST">
    {% csrf_token %}
    {{ form.as_p }}

    <button type="submit">
        Login
    </button>
</form>

<p>
    No account?
    <a href="/register/">Register</a>
</p>

</div>

</body>
</html>
